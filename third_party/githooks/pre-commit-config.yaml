repos:
-   repo: https://github.com/tekwizely/pre-commit-golang
    rev: master
    hooks:
    #
    # Go Build
    -   id: go-build-mod
    # Go Mod Tidy
    -   id: go-mod-tidy
    # Go Test
    -   id: go-test-mod
        args: [-v, -race]
    # GolangCI-Lint
    -   id: golangci-lint-mod

- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: master
  hooks:
    - id: markdownlint